spring:
  application:
    name: eSportClub
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://47.109.30.93:3306/eSportClub?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${DB_USERNAME:haber}
    password: ${DB_PASSWORD:Wsd2026@Haber}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: ESportClubHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.esportclub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 11112
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: strict
        name: ESC_SESSION

jwt:
  secret: ${JWT_SECRET:esportclub-secret-key-2026-very-long-and-secure}
  ttl: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.esportclub: DEBUG
